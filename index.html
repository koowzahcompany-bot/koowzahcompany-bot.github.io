<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koowzah Brand</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">
    <img src="logo.png" alt="Logo">
    <span>Koowzah</span>
  </div>

  <nav>
    <a href="#home">Home</a>
    <a href="#videos">Videos</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section id="home" class="hero">
  <h1>Build Your Future</h1>
  <p>Growth • Discipline • Success</p>
  <a href="#videos" class="btn">Watch Videos</a>
</section>

<!-- VIDEOS -->
<section id="videos" class="section">
  <h2>Latest Videos</h2>

  <div class="videos">
    <iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID" allowfullscreen></iframe>
    <iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID" allowfullscreen></iframe>
    <iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID" allowfullscreen></iframe>
  </div>
</section>

<!-- ABOUT -->
<section id="about" class="section">
  <h2>About Me</h2>
  <p>
    I create content about mindset, discipline, and success.
    My goal is to help you grow every day and build a powerful life.
  </p>
</section>

<!-- CONTACT -->
<section id="contact" class="section">
  <h2>Stay Connected</h2>
  <button onclick="connect()">Join the Journey</button>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 Koowzah Brand</p>
</footer>

<script src="script.js"></script>
</body>
</html>
